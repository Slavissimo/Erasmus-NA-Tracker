services:
  - type: web
    name: erasmus-na-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ADMIN_TOKEN
        sync: false      # nastav vlastnú hodnotu v Render dashboarde
      - key: RUN_SCRAPER
        value: "1"       # scraper beží vo web procese (denne o 06:00 UTC)
